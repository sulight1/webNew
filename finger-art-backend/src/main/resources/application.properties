spring.application.name=finger-art-backend
server.port=3000

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/finger_art?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI 生图 — 阿里云通义万相（DashScope）
# 获取 Key：https://bailian.console.aliyun.com/ → API-KEY 管理 → 创建
# 任选一种方式配置（推荐方式 2，密钥不进 Git）：
# 1. 取消下行注释并填入 sk- 开头的密钥
# 2. 复制 application-local.properties.example 为 application-local.properties 后填入
# 3. 设置环境变量 DASHSCOPE_API_KEY=sk-xxx 后重启后端
spring.config.import=optional:classpath:application-local.properties
ai.image.provider=dashscope
ai.image.public-base-url=http://localhost:3000
# ai.image.dashscope.api-key=sk-在这里粘贴你的密钥
ai.image.dashscope.api-key=${DASHSCOPE_API_KEY:}
ai.image.dashscope.model=wanx2.1-t2i-turbo
ai.image.dashscope.base-url=https://dashscope.aliyuncs.com
ai.image.dashscope.poll-interval-ms=3000
ai.image.dashscope.max-poll-attempts=40

# AI 造物管家 — 通义千问对话（复用 DashScope Key）
ai.chat.enabled=true
ai.chat.api-key=${DASHSCOPE_API_KEY:}
ai.chat.base-url=https://dashscope.aliyuncs.com
ai.chat.model=qwen-turbo
ai.chat.max-tokens=800
ai.chat.temperature=0.7

# JWT 鉴权（生产环境务必设置 JWT_SECRET 环境变量）
auth.jwt.enforce=true
auth.jwt.secret=${JWT_SECRET:finger-art-dev-secret-change-in-production-min-32-chars}
auth.jwt.expiration-ms=604800000
auth.jwt.admin-expiration-ms=7200000

# CORS（生产环境改为前端域名，逗号分隔多个 Origin 时用 application-prod.properties）
app.cors.allowed-origins=http://localhost:5173

# 物流查询 — 快递100（可选，未配置时前端降级为复制单号 + 外链）
logistics.kuaidi100.enabled=false
logistics.kuaidi100.customer=${KUAIDI100_CUSTOMER:}
logistics.kuaidi100.key=${KUAIDI100_KEY:}
logistics.kuaidi100.query-url=https://poll.kuaidi100.com/poll/query.do